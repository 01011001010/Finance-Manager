services:
  postgres_prod:
    networks:
      prod_net:
        aliases:
          - postgres
    image: postgres:15
    container_name: Fin-PostgresDB
    restart: "no"
    env_file:
      - .env.prod
    environment:
      TZ: Europe/Zurich
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./database/init_fin_schema.sql:/docker-entrypoint-initdb.d/01_fin_init.sql
    ports:
      - "5432:5432"
    healthcheck:  # TODO complex healthcheck that tests db/table existence
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend_prod:
    networks:
      prod_net:
        aliases:
          - backend
    build:
      context: ./backend
    container_name: Fin-fastAPI
    restart: "no"
    environment:
      TZ: Europe/Zurich
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    depends_on:
      postgres_prod:
        condition: service_healthy

  frontend_prod:
    networks:
    - prod_net
    build:
      context: ./frontend
    container_name: Fin-Vue
    restart: "no"
    environment:
      TZ: Europe/Zurich
    ports:
      - "5173:5173"
    depends_on:
      - backend_prod

volumes:
  postgres_data_prod:

networks:
  prod_net:
